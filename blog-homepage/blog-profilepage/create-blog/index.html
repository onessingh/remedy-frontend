<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Perfect Blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="editor-container">
        <div class="header">
            <h1 id="pageTitle">Create Your Perfect Blog</h1>
            <p class="subtitle">Customize your blog with advanced features and beautiful templates</p>
        </div>

        <div class="template-selector">
            <h2>Select a Template</h2>
            <div class="template-slider-container">
                <button class="slider-arrow left-arrow" onclick="slideTemplates('left')" aria-label="Previous template">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="template-grid" id="templateGrid"></div>
                <button class="slider-arrow right-arrow" onclick="slideTemplates('right')" aria-label="Next template">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div class="blog-form">
            <div class="ribbon horizontal">
                <button class="tab active" onclick="openTab(event, 'home')" aria-selected="true">
                    <i class="fas fa-home"></i> Home
                </button>
                <button class="tab" onclick="openTab(event, 'insert')" aria-selected="false">
                    <i class="fas fa-plus"></i> Insert
                </button>
            </div>

            <div id="home" class="tab-content active">
                <div class="toolbar horizontal">
                    <div class="tool-group">
                        <select class="modern-select" onchange="format('fontName', this.value)" aria-label="Font family">
                            <option value="Arial">Arial</option>
                            <option value="Roboto">Roboto</option>
                            <option value="Montserrat">Montserrat</option>
                            <option value="Lora">Lora</option>
                            <option value="Poppins">Poppins</option>
                            <option value="Open Sans">Open Sans</option>
                            <option value="Playfair Display">Playfair Display</option>
                            <option value="Raleway">Raleway</option>
                            <option value="Merriweather">Merriweather</option>
                            <option value="Nunito">Nunito</option>
                            <option value="Oswald">Oswald</option>
                            <option value="Quicksand">Quicksand</option>
                            <option value="Source Sans Pro">Source Sans Pro</option>
                            <option value="Ubuntu">Ubuntu</option>
                            <option value="Varela Round">Varela Round</option>
                            <option value="Work Sans">Work Sans</option>
                            <option value="Cabin">Cabin</option>
                            <option value="Dosis">Dosis</option>
                            <option value="Fira Sans">Fira Sans</option>
                            <option value="Josefin Sans">Josefin Sans</option>
                        </select>
                        <select class="modern-select" onchange="format('fontSize', this.value)" aria-label="Font size">
                            <option value="2.edade: true
                            <option value="8pt">8pt</option>
                            <option value="10pt">10pt</option>
                            <option value="11pt">11pt</option>
                            <option value="12pt">12pt</option>
                            <option value="13pt">13pt</option>
                            <option value="14pt">14pt</option>
                            <option value="16pt">16pt</option>
                            <option value="18pt">18pt</option>
                            <option value="20pt">20pt</option>
                            <option value="24pt">24pt</option>
                            <option value="36pt">36pt</option>
                        </select>
                    </div>
                    <div class="tool-group">
                        <button class="tool-btn" onclick="format('bold')" aria-label="Bold"><i class="fas fa-bold"></i></button>
                        <button class="tool-btn" onclick="format('italic')" aria-label="Italic"><i class="fas fa-italic"></i></button>
                        <button class="tool-btn" onclick="format('underline')" aria-label="Underline"><i class="fas fa-underline"></i></button>
                    </div>
                    <div class="tool-group">
                        <button class="tool-btn" onclick="format('justifyLeft')" aria-label="Align left"><i class="fas fa-align-left"></i></button>
                        <button class="tool-btn" onclick="format('justifyCenter')" aria-label="Align center"><i class="fas fa-align-center"></i></button>
                        <button class="tool-btn" onclick="format('justifyRight')" aria-label="Align right"><i class="fas fa-align-right"></i></button>
                    </div>
                    <div class="tool-group">
                        <div class="color-picker-container">
                            <label for="textColor"><i class="fas fa-palette"></i></label>
                            <input type="color" id="textColor" onchange="changeColor()" aria-label="Text color">
                        </div>
                        <button class="tool-btn" onclick="createHyperlink()" aria-label="Insert link"><i class="fas fa-link"></i></button>
                    </div>
                </div>
            </div>

            <div id="insert" class="tab-content">
                <div class="toolbar horizontal">
                    <div class="tool-group">
                        <button class="tool-btn" onclick="format('insertOrderedList')" aria-label="Ordered list"><i class="fas fa-list-ol"></i></button>
                        <button class="tool-btn" onclick="format('insertUnorderedList')" aria-label="Unordered list"><i class="fas fa-list-ul"></i></button>
                    </div>
                </div>
            </div>

           <div class="form-section active">
                <h2><i class="fas fa-info-circle"></i> Basic Information</h2>
                <div class="form-group">
                    <label for="blogTitle">Blog Title:</label>
                    <input type="text" id="blogTitle" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="blogCategory">Blog Category:</label>
                    <select id="blogCategory" required aria-required="true">
                        <option value="" disabled selected>Select a category</option>
                        <option value="Technology">Technology</option>
                        <option value="Lifestyle">Lifestyle</option>
                        <option value="Travel">Travel</option>
                        <option value="Food">Food</option>
                        <option value="Education">Education</option>
                    </select>
                </div>
                <!-- नया लोकेशन फील्ड -->
                <div class="form-group">
                    <label for="blogLocation">Location (optional):</label>
                    <input type="text" id="blogLocation" placeholder="e.g., New York, Paris">
                </div>
                <div class="form-group">
                    <label for="blogTags">Blog Tags (comma-separated):</label>
                    <input type="text" id="blogTags" placeholder="e.g., tech, coding, tutorial">
                    <div class="tag-preview" id="tagPreview" role="list"></div>
                </div>
                <div class="navigation-buttons">
                    <button class="next-btn"><i class="fas fa-arrow-right"></i> Next</button>
                </div>
            </div>
            <div class="form-section">
                <h2><i class="fas fa-pen"></i> Blog Content</h2>
                <div class="form-group">
                    <label for="blogContent">Your Content:</label>
                    <div class="content-editor" id="blogContent" contenteditable="true" placeholder="Start writing your blog content here..." aria-multiline="true" role="textbox"></div>
                </div>
                <div class="navigation-buttons">
                    <button class="prev-btn"><i class="fas fa-arrow-left"></i> Previous</button>
                    <button class="next-btn"><i class="fas fa-arrow-right"></i> Next</button>
                </div>
            </div>

            <div class="form-section">
                <h2><i class="fas fa-image"></i> Media & Layout</h2>
                <div class="form-group">
                    <label>Featured Images:</label>
                    <div class="image-upload-container">
                        <label class="upload-label" for="blogImages">
                            <i class="fas fa-cloud-upload-alt"></i>
                            Choose images or drag & drop here
                        </label>
                        <input type="file" id="blogImages" accept="image/*" multiple aria-label="Upload images">
                        <div class="image-preview"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Featured Videos:</label>
                    <div class="video-upload-container">
                        <label class="upload-label" for="blogVideos">
                            <i class="fas fa-video"></i>
                            Choose videos or drag & drop here
                        </label>
                        <input type="file" id="blogVideos" accept="video/*" multiple aria-label="Upload videos">
                        <div class="video-preview"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Layout Options:</label>
                    <div class="layout-options">
                        <div class="layout-option">
                            <input type="radio" name="layout" id="standard" value="standard" checked>
                            <label for="standard">
                                <div class="layout-preview standard-layout"></div>
                                Standard
                            </label>
                        </div>
                        <div class="layout-option">
                            <input type="radio" name="layout" id="featured-left" value="featured-left">
                            <label for="featured-left">
                                <div class="layout-preview featured-left-layout"></div>
                                Featured Left
                            </label>
                        </div>
                        <div class="layout-option">
                            <input type="radio" name="layout" id="featured-right" value="featured-right">
                            <label for="featured-right">
                                <div class="layout-preview featured-right-layout"></div>
                                Featured Right
                            </label>
                        </div>
                        <div class="layout-option">
                            <input type="radio" name="layout" id="full-width" value="full-width">
                            <label for="full-width">
                                <div class="layout-preview full-width-layout"></div>
                                Full Width
                            </label>
                        </div>
                    </div>
                </div>
                <div class="navigation-buttons">
                    <button class="prev-btn"><i class="fas fa-arrow-left"></i> Previous</button>
                    <button class="next-btn"><i class="fas fa-arrow-right"></i> Next</button>
                </div>
            </div>

            <div class="form-section">
                <h2><i class="fas fa-eye"></i> Preview & Publish</h2>
                <div class="form-group">
                    <label>Final Preview:</label>
                    <div class="blog-preview" id="blogPreview"></div>
                </div>
                <div class="form-group">
                    <label for="publishOptions">Publish Options:</label>
                    <select id="publishOptions" required aria-required="true">
                        <option value="publish">Publish Immediately</option>
                        <option value="draft">Save as Draft</option>
                        <option value="schedule">Schedule for Later</option>
                    </select>
                    <div id="scheduleDateContainer" class="hidden">
                        <label for="scheduleDate">Schedule Date & Time:</label>
                        <input type="datetime-local" id="scheduleDate" aria-label="Schedule date and time">
                    </div>
                </div>
                <div class="navigation-buttons">
                    <button class="prev-btn"><i class="fas fa-arrow-left"></i> Previous</button>
                    <button class="publish-btn" id="publishBtn"><i class="fas fa-upload"></i> Publish Blog</button>
                </div>
            </div>
        </div>

        <div class="uploaded-blogs-container">
            <h2><i class="fas fa-book"></i> Your Recent Blogs & Drafts</h2>
            <div class="uploaded-blogs-grid" id="uploadedBlogs"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
