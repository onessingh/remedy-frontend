<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>
    <div class="edit-profile-container">
        <div class="profile-header">
            <h1><i class="fas fa-user-edit"></i> Edit Profile</h1>
        </div>

        <!-- Profile Picture Upload -->
        <div class="profile-picture-section">
            <div class="image-upload">
                <label for="profilePicture">
                    <img id="profilePreview" src="/images/default.jpg" alt="Profile Preview">
                    <div class="upload-overlay">
                        <i class="fas fa-camera"></i>
                    </div>
                </label>
                <input type="file" id="profilePicture" accept="image/*" />
            </div>
        </div>

        <!-- Form Fields -->
        <div class="form-group">
            <label for="name"><i class="fas fa-user"></i> Name:</label>
            <input type="text" id="name" placeholder="Enter your name" />
        </div>
        <div class="form-group">
            <label for="achievements"><i class="fas fa-trophy"></i> Achievements & Awards:</label>
            <textarea id="achievements" placeholder="List your achievements"></textarea>
        </div>

        <div class="form-group">
            <label for="aboutMe"><i class="fas fa-info-circle"></i> About Me:</label>
            <textarea id="aboutMe" placeholder="Write something about yourself"></textarea>
        </div>

        <div class="social-media-section">
            <h3><i class="fas fa-share-alt"></i> Social Media Links</h3>
            <div class="form-group">
                <label for="linkedin"><i class="fab fa-linkedin"></i> LinkedIn:</label>
                <input type="url" id="linkedin" placeholder="https://linkedin.com/in/username" />
            </div>

            <div class="form-group">
                <label for="github"><i class="fab fa-github"></i> GitHub:</label>
                <input type="url" id="github" placeholder="https://github.com/username" />
            </div>

            <div class="form-group">
                <label for="twitter"><i class="fab fa-twitter"></i> Twitter:</label>
                <input type="url" id="twitter" placeholder="https://twitter.com/username" />
            </div>
        </div>

        <div class="button-group">
            <button id="saveProfile"><i class="fas fa-save"></i> Save Changes</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
